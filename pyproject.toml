[tool.uv.workspace]
members = ["packages/*", "apps/api", "apps/livekit-agent"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "hatchling>=1.24",
]

[tool.pytest.ini_options]
# importlib mode: apps/api/tests and packages/*/tests are all packages named
# "tests"; the default prepend mode raises ImportPathMismatchError when they
# are collected in one run (the documented `pytest apps/api/tests/ packages/`).
addopts = "--import-mode=importlib"
asyncio_mode = "auto"

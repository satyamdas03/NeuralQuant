# Emulates the Supabase REST surface for the demo stack:
# the API calls {SUPABASE_URL}/rest/v1/<table>; PostgREST serves at /.
events {}

http {
  server {
    listen 54321;

    location /rest/v1/ {
      proxy_pass http://postgrest:3000/;
      proxy_set_header Host $host;
    }

    # Auth endpoints don't exist in demo mode — return empty JSON instead of 502
    location /auth/ {
      default_type application/json;
      return 200 '{}';
    }

    location / {
      proxy_pass http://postgrest:3000/;
    }
  }
}

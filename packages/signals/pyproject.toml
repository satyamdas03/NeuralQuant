[project]
name = "nq-signals"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "nq-data",
    "lightgbm>=4.3",
    "hmmlearn>=0.3",
    "scikit-learn>=1.4",
    "pandas-ta>=0.3",
    "transformers>=4.39",
    "torch>=2.2",
    "scipy>=1.12",
    "numpy>=1.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
nq-data = { workspace = true }

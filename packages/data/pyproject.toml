[project]
name = "nq-data"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "yfinance>=0.2.40",
    "pandas>=2.2",
    "numpy>=1.26",
    "requests>=2.31",
    "pydantic>=2.6",
    "duckdb>=0.10",
    "fredapi>=0.5",
    "feedparser>=6.0",
    "praw>=7.7",
    "jugaad-data>=0.27",
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "tenacity>=8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

services:
  - type: web
    name: nq-api
    autoDeploy: yes
    runtime: python
    pythonVersion: 3.12
    rootDir: .
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn nq_api.main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "10000"
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: PAYPAL_PLAN_INVESTOR_USD
        sync: false
      - key: PAYPAL_PLAN_PRO_USD
        sync: false
      - key: PAYPAL_PLAN_API_USD
        sync: false
      - key: OPENBB_ENABLED
        value: "true"
      - key: OPENBB_API_URL
        value: "https://nq-openbb.onrender.com"
      - key: TRADE_ENABLED
        value: "true"
      - key: DRY_RUN
        value: "true"
      - key: DAILY_LOSS_LIMIT
        value: "100.0"
      - key: MAX_BET_DEFAULT
        value: "5000.0"
      - key: MAX_POSITIONS_DEFAULT
        value: "10"
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: USE_BEDROCK
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: BEDROCK_RUNTIME_REGION
        value: "us-east-1"
    plan: pro
    healthCheckPath: /health

  - type: web
    name: nq-openbb
    runtime: docker
    rootDir: .
    dockerfilePath: openbb-service/Dockerfile
    envVars:
      - key: OPENBB_API_HOST
        value: "0.0.0.0"
      - key: OPENBB_API_PORT
        value: "6900"
      - key: FRED_API_KEY
        sync: false
    plan: standard
    healthCheckPath: /docs

  - type: worker
    name: nq-trader
    runtime: python
    pythonVersion: 3.12
    rootDir: .
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run python trade_daemon.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: TRADE_ENABLED
        value: "true"
      - key: DRY_RUN
        value: "true"
      - key: DAILY_LOSS_LIMIT
        value: "100.0"
      - key: MAX_BET_DEFAULT
        value: "5000.0"
      - key: MAX_POSITIONS_DEFAULT
        value: "10"
      - key: TRADE_DAEMON_SCAN_INTERVAL_MINUTES
        value: "15"
      - key: TRADE_DAEMON_STRATEGY
        value: "value_play"
      - key: TRADE_DAEMON_BANKROLL
        value: "10000.0"
      - key: TRADE_DAEMON_TOP_N
        value: "10"
      - key: TRADE_DAEMON_MAX_SIGNALS_PER_DAY
        value: "20"
    plan: starter

  - type: worker
    name: quantastra-agent
    runtime: python
    pythonVersion: 3.12
    rootDir: .
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run python -m quantastra.agent start
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: "INFO"
    plan: standard

  # ── Cron: Anjali nightly refresh (02:00 UTC daily) ──────────────────
  - type: cron
    name: nq-anjali-refresh
    runtime: python
    pythonVersion: 3.12
    rootDir: .
    schedule: "0 2 * * *"
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run python -c "import os, httpx; r = httpx.post('https://neuralquant.onrender.com/cron/anjali', headers={'X-Cron-Secret': os.environ['CRON_SECRET']}); print(r.status_code, r.text[:200])"
    envVars:
      - key: CRON_SECRET
        sync: false
    plan: starter

  # ── Cron: Market data refresh (20:30 UTC = 4:30pm ET, weekdays) ─────
  - type: cron
    name: nq-market-refresh
    runtime: python
    pythonVersion: 3.12
    rootDir: .
    schedule: "30 20 * * 1-5"
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run python -c "import os, httpx; r = httpx.post('https://neuralquant.onrender.com/cron/market-refresh', headers={'X-Cron-Secret': os.environ['CRON_SECRET']}); print(r.status_code, r.text[:200])"
    envVars:
      - key: CRON_SECRET
        sync: false
    plan: starter

  # ── Cron: IN market wrap broadcast (11:00 UTC = 4:30pm IST, weekdays) ──
  - type: cron
    name: nq-wrap-in
    runtime: python
    pythonVersion: 3.12
    rootDir: .
    schedule: "0 11 * * 1-5"
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run python -c "import os, httpx; r = httpx.post('https://neuralquant.onrender.com/cron/market-wrap?market=IN', headers={'X-Cron-Secret': os.environ['CRON_SECRET']}); print(r.status_code, r.text[:200])"
    envVars:
      - key: CRON_SECRET
        sync: false
    plan: starter

  # ── Cron: US market wrap broadcast (21:30 UTC = 5:30pm ET, weekdays) ──
  - type: cron
    name: nq-wrap-us
    runtime: python
    pythonVersion: 3.12
    rootDir: .
    schedule: "30 21 * * 1-5"
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run python -c "import os, httpx; r = httpx.post('https://neuralquant.onrender.com/cron/market-wrap?market=US', headers={'X-Cron-Secret': os.environ['CRON_SECRET']}); print(r.status_code, r.text[:200])"
    envVars:
      - key: CRON_SECRET
        sync: false
    plan: starter
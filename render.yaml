services:
  - type: web
    name: nq-api
    runtime: python
    pythonVersion: 3.12
    rootDir: .
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn nq_api.main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "10000"
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: PAYPAL_PLAN_INVESTOR_USD
        sync: false
      - key: PAYPAL_PLAN_PRO_USD
        sync: false
      - key: PAYPAL_PLAN_API_USD
        sync: false
      - key: OPENBB_ENABLED
        value: "true"
      - key: OPENBB_API_URL
        value: "https://nq-openbb.onrender.com"
      - key: TRADE_ENABLED
        value: "false"
      - key: DRY_RUN
        value: "true"
      - key: DAILY_LOSS_LIMIT
        value: "100.0"
      - key: MAX_BET_DEFAULT
        value: "5000.0"
      - key: MAX_POSITIONS_DEFAULT
        value: "10"
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        value: "true"
    plan: pro
    healthCheckPath: /health

  - type: web
    name: nq-openbb
    runtime: docker
    rootDir: .
    dockerfilePath: openbb-service/Dockerfile
    envVars:
      - key: OPENBB_API_HOST
        value: "0.0.0.0"
      - key: OPENBB_API_PORT
        value: "6900"
      - key: FRED_API_KEY
        sync: false
    plan: standard
    healthCheckPath: /docs
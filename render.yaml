services:
  - type: web
    name: nq-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install uv && uv pip install -e ../../packages/data -e ../../packages/signals -e . --system && pip install "slack-bolt>=1.18" "slack-sdk>=3.21"
    startCommand: pip install "slack-bolt>=1.18" "slack-sdk>=3.21" && uvicorn nq_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
    plan: free

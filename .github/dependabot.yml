# Dependabot — automated dependency update PRs (security roadmap P5).
# Grouped weekly to keep PR volume manageable; security updates still arrive
# individually as soon as advisories land.
version: 2
updates:
  # ── Python (uv workspace) ────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      api-deps:
        patterns: ["*"]

  # ── Node apps ────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/apps/team"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      team-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      mobile-deps:
        patterns: ["*"]

  # ── CI workflows ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

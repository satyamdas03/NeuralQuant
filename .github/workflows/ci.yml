name: Lint

on:
  pull_request:
    branches: [master]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-local-path: .uv-cache

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check packages/ apps/api/ --exit-zero

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install & lint — web
        run: |
          cd apps/web
          npm ci
          npx eslint .
name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-${{ github.sha }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" || true
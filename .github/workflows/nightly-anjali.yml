name: nightly-anjali

on:
  schedule:
    - cron: "30 20 * * *"  # 20:30 UTC daily = 2:00 AM IST — after India market close, before US open
  workflow_dispatch:
    inputs:
      market:
        description: "Market to process (US, IN, BOTH)"
        required: false
        default: "BOTH"
        type: choice
        options:
          - US
          - IN
          - BOTH
      universe:
        description: "Universe to process (SP500, SP400, SP600, NIFTY200, ALL)"
        required: false
        default: "ALL"
        type: choice
        options:
          - SP500
          - SP400
          - SP600
          - NIFTY200
          - ALL

concurrency:
  group: nightly-anjali
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # ~1700 stocks at 0.3s each ≈ 8.5 min, but yfinance can be slow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install deps (api + signals + data packages)
        run: |
          uv pip install --system \
            "fastapi>=0.115" "pydantic>=2.8" "uvicorn" \
            "yfinance>=0.2.50" "pandas" "numpy" "requests" \
            "anthropic>=0.40" "pyjwt[crypto]>=2.9" "supabase>=2.8" \
            "scipy" "hmmlearn>=0.3" "scikit-learn" "vaderSentiment>=3.3.2"
          uv pip install --system -e packages/data -e packages/signals -e apps/api

      - name: Run Anjali enrichment data collection
        env:
          PYTHONUNBUFFERED: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/nightly_anjali.py --market ${{ inputs.market || 'BOTH' }} --universe ${{ inputs.universe || 'ALL' }}
# NeuralQuant demo stack — evaluate the product with ZERO external API keys.
#
#   cp .env.example .env          # set DEMO_MODE=true
#   docker compose up --build
#   open http://localhost:3000
#
# Architecture: the API talks to Supabase via PostgREST REST (not raw SQL),
# so the demo stack reproduces that surface locally:
#   db (postgres, seeded from data/demo_snapshot)
#     -> postgrest (REST layer)
#     -> rest-proxy (nginx, adds the /rest/v1 path prefix Supabase uses)
#     -> api (FastAPI, SUPABASE_URL points at rest-proxy)
#     -> web (Next.js)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neuralquant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
      - ./data/demo_snapshot:/demo_data:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@db:5432/neuralquant
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: postgres   # demo only — full read/write, no auth
    depends_on:
      db: { condition: service_healthy }

  rest-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/rest-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["54321:54321"]
    depends_on: [postgrest]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DEMO_MODE: "true"
      SUPABASE_URL: http://rest-proxy:54321
      SUPABASE_SERVICE_ROLE_KEY: demo-local-no-auth
      SUPABASE_ANON_KEY: demo-local-no-auth
      PORT: "8000"
      FRONTEND_URL: http://localhost:3000
    ports: ["8000:8000"]
    depends_on: [rest-proxy]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000          # baked at build time
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321    # rest-proxy stubs /auth/
        NEXT_PUBLIC_SUPABASE_ANON_KEY: demo-local-no-auth
        API_PROXY_URL: http://api:8000   # server-side /api rewrite target
    environment:
      API_PROXY_URL: http://api:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
